<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Av/EngineOS — GlobalAir.com Revenue Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23102297'/><text x='16' y='22' text-anchor='middle' font-size='14' fill='%2397cb00' font-weight='700'>Av</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <a href="#content-area" class="skip-link">Skip to main content</a>

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="avos avos-sm" style="justify-content:center">
        <span class="avos-av">Av</span>
        <span class="avos-slash">/</span>
        <span class="avos-core">Engine</span>
        <span class="avos-os">OS</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Command</div>
      <div class="nav-item active" data-route="command" onclick="Router.navigate('command')" tabindex="0" role="link">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Command Center</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Domains</div>
      <div class="nav-item" data-route="ppc" onclick="Router.navigate('ppc')" tabindex="0" role="link">
        <span class="nav-icon">&#128176;</span>
        <span class="nav-label">PPC</span>
        <span class="nav-badge" id="nav-badge-ppc"></span>
      </div>
      <div class="nav-item" data-route="seo" onclick="Router.navigate('seo')" tabindex="0" role="link">
        <span class="nav-icon">&#128269;</span>
        <span class="nav-label">SEO</span>
        <span class="nav-badge" id="nav-badge-seo"></span>
      </div>
      <div class="nav-item" data-route="listings" onclick="Router.navigate('listings')" tabindex="0" role="link">
        <span class="nav-icon">&#9992;</span>
        <span class="nav-label">Listings</span>
        <span class="nav-badge" id="nav-badge-listings"></span>
      </div>
      <div class="nav-item" data-route="monetization" onclick="Router.navigate('monetization')" tabindex="0" role="link">
        <span class="nav-icon">&#128178;</span>
        <span class="nav-label">Monetization</span>
        <span class="nav-badge" id="nav-badge-monetization"></span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Operations</div>
      <div class="nav-item" data-route="opportunities" onclick="Router.navigate('opportunities')" tabindex="0" role="link">
        <span class="nav-icon">&#127919;</span>
        <span class="nav-label">Opportunity Queue</span>
      </div>
      <div class="nav-item" data-route="decisions" onclick="Router.navigate('decisions')" tabindex="0" role="link">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">Decision Log</span>
      </div>
      <div class="nav-item" data-route="gaps" onclick="Router.navigate('gaps')" tabindex="0" role="link">
        <span class="nav-icon">&#9888;</span>
        <span class="nav-label">Gaps & Blockers</span>
        <span id="nav-gap-dot"></span>
      </div>
    </div>

    <div style="margin-top:auto; padding:16px 20px; font-size:10px; color:rgba(255,255,255,0.25);">
      GlobalAir.com &copy; 2026
    </div>
  </nav>

  <!-- ============================================================
       MAIN AREA
       ============================================================ -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
        <div id="topbar-date-range"></div>
        <div id="topbar-category"></div>
        <div id="topbar-signal-toggle"></div>
      </div>
      <div class="topbar-right">
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-ghost btn-sm" onclick="DataBridge.exportAll()" title="Export all data as JSON">&#128230; Export</button>
          <button class="btn btn-ghost btn-sm" onclick="DataBridge.showImportDialog()" title="Import data from JSON">&#128229; Import</button>
        </div>
        <div id="topbar-op-mode"></div>
      </div>
    </header>

    <!-- Content Area -->
    <main id="content-area">
      <div class="page-loading">
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
      </div>
    </main>

  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- ============================================================
       SCRIPTS — Order matters: dependencies first, pages last
       ============================================================ -->
  <script src="js/store.js"></script>
  <script src="js/data-bridge.js"></script>
  <script src="js/events.js"></script>
  <script src="js/components.js"></script>
  <script src="js/opportunity.js"></script>
  <script src="js/decision-log.js"></script>
  <script src="js/gaps.js"></script>
  <script src="js/windsor.js"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/router.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/command-center.js"></script>
  <script src="js/pages/ppc-hub.js"></script>
  <script src="js/pages/seo-hub.js"></script>
  <script src="js/pages/listings-hub.js"></script>
  <script src="js/pages/monetization-hub.js"></script>
  <script src="js/pages/opportunity-queue.js"></script>
  <script src="js/pages/decision-log-page.js"></script>
  <script src="js/pages/gaps-blockers.js"></script>

  <script>
    // ---- Boot ----
    (async function boot() {
      SeedData.initialize();
      await Windsor.hydrate();
      renderTopbar();
      updateNavBadges();
      Router.init();
    })();

    // Keyboard support: Enter on nav items
    document.querySelectorAll('.nav-item[data-route]').forEach(item => {
      item.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); } });
    });

    function renderTopbar() {
      const settings = Store.get('engine_settings') || {};
      document.getElementById('topbar-date-range').innerHTML = Components.dateRangePicker(settings.date_range || '7d');
      document.getElementById('topbar-category').innerHTML = Components.categoryFilter();
      document.getElementById('topbar-signal-toggle').innerHTML = Components.signalCleanToggle();
      document.getElementById('topbar-op-mode').innerHTML = Components.operatingModePill();
    }

    function updateNavBadges() {
      ['ppc', 'seo', 'listings', 'monetization'].forEach(d => {
        const count = Opportunity.countByDomain(d);
        const el = document.getElementById(`nav-badge-${d}`);
        if (el) { el.textContent = count > 0 ? count : ''; el.style.display = count > 0 ? '' : 'none'; }
      });
      const gapDot = document.getElementById('nav-gap-dot');
      if (gapDot) {
        if (Gaps.hasBlockingGaps()) {
          gapDot.className = 'nav-dot-red';
        } else {
          gapDot.className = '';
        }
      }
    }
  </script>

</body>
</html>
